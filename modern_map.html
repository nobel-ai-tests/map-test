<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Advanced US Data Map</title>
    <script type="text/javascript" src="d3.js"></script>
    <style type="text/css">
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #f0f2f5;
        }

        /* Sidebar styling */
        .sidebar {
            width: 300px;
            background: #fff;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        .sidebar-left { border-right: 1px solid #ddd; }
        .sidebar-right { border-left: 1px solid #ddd; }

        .sidebar-header {
            padding: 15px;
            background: #2c3e50;
            color: white;
        }

        .sidebar-header h2 { margin: 0; font-size: 1.1rem; }

        .config-section {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .config-section h3 {
            margin-top: 0;
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .control-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label { font-size: 0.8rem; font-weight: 600; color: #444; }

        input[type="color"], input[type="range"], select, textarea {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px;
        }

        textarea { height: 100px; font-family: monospace; }

        .btn {
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
            font-size: 13px;
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn:hover { opacity: 0.9; }

        /* Map area styling */
        .map-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: inherit; /* Follow body bg */
        }

        svg { width: 100%; height: 100%; cursor: grab; }
        svg:active { cursor: grabbing; }

        .state { stroke: #000; stroke-width: 0.5; transition: stroke 0.2s; }
        .state:hover { stroke: #000; stroke-width: 2.0; }

        .state-label {
            font-weight: bold;
            fill: #333;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 0px 0px 2px rgba(255,255,255,0.9);
        }

        /* Font Size List */
        .font-size-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 8px;
            background: #fafafa;
        }
        .font-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- Left Sidebar: Data and Colors -->
    <div class="sidebar sidebar-left">
        <div class="sidebar-header">
            <h2>Data & Spectrum</h2>
        </div>

        <div class="config-section">
            <h3>Visuals</h3>
            <div class="control-group">
                <label>Background Color</label>
                <input type="color" id="bgPicker" value="#f0f2f5">
            </div>
            <div class="control-group">
                <label>Name Format</label>
                <select id="nameFormat">
                    <option value="full">Full Name</option>
                    <option value="abbr">Abbreviation</option>
                </select>
            </div>
        </div>

        <div class="config-section">
            <h3>Color Spectrum</h3>
            <div class="control-group">
                <label>Low Value Color</label>
                <input type="color" id="colorLow" value="#edf8e9">
            </div>
            <div class="control-group">
                <label>High Value Color</label>
                <input type="color" id="colorHigh" value="#006d2c">
            </div>
            <div class="control-group">
                <label>Zero/No Value Color</label>
                <input type="color" id="colorZero" value="#eeeeee">
            </div>
            <div class="control-group">
                <label>Spectrum Steps</label>
                <input type="range" id="colorSteps" min="2" max="9" value="5">
            </div>
        </div>

        <div class="config-section">
            <h3>Custom Data</h3>
            <div class="control-group">
                <label>JSON, CSV, or Space-Separated</label>
                <textarea id="jsonData" placeholder='{"CA": 10} or CA,10 or CA 10'>{}</textarea>
            </div>
            <button class="btn btn-primary" id="applyData" style="width:100%">Apply Data</button>
        </div>

        <div class="config-section">
            <button class="btn btn-danger" id="resetZoom" style="width:100%">Reset View</button>
        </div>
    </div>

    <!-- Central Map Area -->
    <div class="map-container">
        <svg id="map-svg"></svg>
    </div>

    <!-- Right Sidebar: Font Properties -->
    <div class="sidebar sidebar-right">
        <div class="sidebar-header">
            <h2>Font Properties</h2>
        </div>

        <div class="config-section">
            <h3>Global Style</h3>
            <div class="control-group">
                <label>Label Color</label>
                <input type="color" id="fontColor" value="#333333">
            </div>
            <div class="control-group">
                <label>Global Font Size</label>
                <input type="range" id="globalFontSize" min="6" max="24" value="10">
            </div>
            <div class="control-group">
                <label>Font Weight</label>
                <select id="fontWeight">
                    <option value="bold">Bold</option>
                    <option value="normal">Normal</option>
                    <option value="900">Heavy</option>
                </select>
            </div>
            <div class="control-group">
                <label>Font Style</label>
                <select id="fontStyle">
                    <option value="normal">Normal</option>
                    <option value="italic">Italic</option>
                </select>
            </div>
        </div>

        <div class="config-section">
            <h3>State Font Sizes</h3>
            <div class="font-size-list" id="fontSizeList">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // State Name to Abbreviation Mapping
        var stateMap = {
            "Alabama": "AL", "Alaska": "AK", "Arizona": "AZ", "Arkansas": "AR", "California": "CA",
            "Colorado": "CO", "Connecticut": "CT", "Delaware": "DE", "Florida": "FL", "Georgia": "GA",
            "Hawaii": "HI", "Idaho": "ID", "Illinois": "IL", "Indiana": "IN", "Iowa": "IA",
            "Kansas": "KS", "Kentucky": "KY", "Louisiana": "LA", "Maine": "ME", "Maryland": "MD",
            "Massachusetts": "MA", "Michigan": "MI", "Minnesota": "MN", "Mississippi": "MS", "Missouri": "MO",
            "Montana": "MT", "Nebraska": "NE", "Nevada": "NV", "New Hampshire": "NH", "New Jersey": "NJ",
            "New Mexico": "NM", "New York": "NY", "North Carolina": "NC", "North Dakota": "ND", "Ohio": "OH",
            "Oklahoma": "OK", "Oregon": "OR", "Pennsylvania": "PA", "Rhode Island": "RI", "South Carolina": "SC",
            "South Dakota": "SD", "Tennessee": "TN", "Texas": "TX", "Utah": "UT", "Vermont": "VT",
            "Virginia": "VA", "Washington": "WA", "West Virginia": "WV", "Wisconsin": "WI", "Wyoming": "WY"
        };
        var reverseMap = {};
        for(var key in stateMap) reverseMap[stateMap[key]] = key;

        var w = window.innerWidth - 600; // Account for two 300px sidebars
        var h = window.innerHeight;
        var customData = {};
        var individualFontSizes = {};

        var svg = d3.select("#map-svg").attr("viewBox", "0 0 " + w + " " + h);
        var g = svg.append("g");

        var projection = d3.geoAlbersUsa().translate([w / 2, h / 2]).scale(Math.min(w, h) * 1.3);
        var path = d3.geoPath().projection(projection);

        var color = d3.scaleQuantize().range(["#edf8e9", "#bae4b3", "#74c476", "#31a354", "#006d2c"]);
        var zoom = d3.zoom().scaleExtent([1, 15]).on("zoom", function() { g.attr("transform", d3.event.transform); });
        svg.call(zoom);

        // Sidebar logic
        d3.select("#bgPicker").on("input", function() { d3.select("body").style("background-color", this.value); });
        
        d3.select("#globalFontSize").on("input", updateLabels);
        d3.select("#fontColor").on("input", updateLabels);
        d3.select("#fontWeight").on("change", updateLabels);
        d3.select("#fontStyle").on("change", updateLabels);

        d3.select("#colorLow").on("input", updateColorRange);
        d3.select("#colorHigh").on("input", updateColorRange);
        d3.select("#colorZero").on("input", updateVisuals);
        d3.select("#colorSteps").on("input", updateColorRange);

        function updateColorRange() {
            var low = d3.select("#colorLow").property("value");
            var high = d3.select("#colorHigh").property("value");
            var steps = +d3.select("#colorSteps").property("value");
            
            var interpolator = d3.interpolateRgb(low, high);
            var newRange = [];
            for (var i = 0; i < steps; i++) {
                newRange.push(interpolator(i / (steps - 1)));
            }
            color.range(newRange);
            updateVisuals();
        }

        d3.select("#nameFormat").on("change", updateLabels);

        d3.select("#applyData").on("click", function() {
            var rawInput = d3.select("#jsonData").property("value").trim();
            if (!rawInput) return;

            var input = {};

            // 1. Try JSON / Python Dict Parser
            try {
                var sanitizedJSON = rawInput.replace(/'/g, '"');
                input = JSON.parse(sanitizedJSON);
            } catch (e) {
                // 2. Try CSV or Space-Separated Line Parser
                input = {};
                var lines = rawInput.split(/\r?\n/);
                lines.forEach(function(line) {
                    line = line.trim();
                    if (!line) return;
                    
                    // Split by comma or one or more spaces
                    var parts = line.split(/[,|\s+]/);
                    if (parts.length >= 2) {
                        var key = parts[0].trim();
                        var val = parseFloat(parts[parts.length - 1].trim());
                        if (!isNaN(val)) input[key] = val;
                    }
                });
            }

            if (Object.keys(input).length === 0) {
                alert("Could not parse data. Ensure it's JSON, CSV, or State Value (one per line).");
                return;
            }

            customData = {};
            for (var key in input) {
                var upperKey = key.toUpperCase();
                var fullStateName = reverseMap[upperKey] || key;
                customData[fullStateName] = input[key];
            }
            updateVisuals();
        });

        d3.select("#resetZoom").on("click", function() {
            // Reset Data
            customData = {};
            d3.select("#jsonData").property("value", "{}");
            updateVisuals();

            // Reset Zoom
            svg.transition()
               .duration(750)
               .call(zoom.transform, d3.zoomIdentity);
        });

        var geoJson;
        d3.json("inner/us-states.json", function(json) {
            geoJson = json;
            
            // Build Font Size List in Sidebar
            var list = d3.select("#fontSizeList");
            json.features.sort(function(a,b) { return d3.ascending(a.properties.name, b.properties.name); });
            
            json.features.forEach(function(f) {
                var name = f.properties.name;
                var item = list.append("div").attr("class", "font-item");
                item.append("span").text(name).style("flex", "1");
                item.append("input")
                    .attr("type", "range")
                    .attr("min", "6")
                    .attr("max", "24")
                    .attr("value", 10)
                    .style("width", "100px")
                    .on("input", function() {
                        individualFontSizes[name] = this.value;
                        updateLabels();
                    });
            });

            g.selectAll("path")
                .data(json.features)
                .enter()
                .append("path")
                .attr("class", "state")
                .attr("d", path)
                .style("fill", "#ccc");

            updateVisuals();
        });

        function updateVisuals() {
            var zeroColor = d3.select("#colorZero").property("value");
            var values = Object.values(customData);
            if (values.length > 0) {
                color.domain([d3.min(values), d3.max(values)]);
            } else {
                color.domain([0, 10]); // Default
            }

            g.selectAll(".state")
                .transition().duration(500)
                .style("fill", function(d) {
                    var val = customData[d.properties.name];
                    // If the value is undefined OR exactly 0, use the zero color
                    if (val === undefined || val === 0) {
                        return zeroColor;
                    }
                    return color(val);
                });

            updateLabels();
        }

        function updateLabels() {
            var format = d3.select("#nameFormat").property("value");
            var globalSize = d3.select("#globalFontSize").property("value");
            var fColor = d3.select("#fontColor").property("value");
            var fWeight = d3.select("#fontWeight").property("value");
            var fStyle = d3.select("#fontStyle").property("value");

            var labels = g.selectAll(".state-label").data(geoJson.features);

            var enter = labels.enter()
                .append("text")
                .attr("class", "state-label")
                .attr("transform", function(d) {
                    var c = path.centroid(d);
                    return c ? "translate(" + c + ")" : "translate(-100,-100)";
                });

            labels.merge(enter)
                .text(function(d) {
                    var name = (format === "full") ? d.properties.name : (stateMap[d.properties.name] || d.properties.name);
                    var val = customData[d.properties.name] !== undefined ? customData[d.properties.name] : 0;
                    return name + " (" + val + ")";
                })
                .style("font-size", function(d) {
                    return (individualFontSizes[d.properties.name] || globalSize) + "px";
                })
                .style("fill", fColor)
                .style("font-weight", fWeight)
                .style("font-style", fStyle);
        }

        window.addEventListener("resize", function() {
            w = window.innerWidth - 600;
            h = window.innerHeight;
            svg.attr("viewBox", "0 0 " + w + " " + h);
            projection.translate([w / 2, h / 2]).scale(Math.min(w, h) * 1.3);
            g.selectAll("path").attr("d", path);
            g.selectAll(".state-label").attr("transform", function(d) {
                var c = path.centroid(d);
                return c ? "translate(" + c + ")" : null;
            });
        });

    </script>
</body>
</html>
