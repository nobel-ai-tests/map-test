<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Modernized US Agriculture Map</title>
    <script type="text/javascript" src="d3.js"></script>
    <style type="text/css">
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-top: 30px;
        }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #f0f0f0;
            border-color: #999;
        }

        button#reset {
            background-color: #e74c3c;
            color: white;
            border: none;
        }

        button#reset:hover {
            background-color: #c0392b;
        }

        .map-container {
            width: 90%;
            max-width: 1000px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        svg {
            width: 100%;
            height: auto;
        }

        .state {
            stroke: #fff;
            stroke-width: 0.5;
            transition: opacity 0.2s ease;
        }

        .state:hover {
            opacity: 0.8;
            stroke: #2c3e50;
            stroke-width: 1.5;
        }

        #tooltip {
            position: absolute;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .legend {
            font-size: 12px;
            fill: #666;
        }

        .legend-title {
            font-weight: bold;
            fill: #333;
        }

    </style>
</head>
<body>
    <h1>US Agricultural Productivity</h1>
    
    <div class="controls">
        <button id="pnw">Pacific Northwest</button>
        <button id="reset">Reset Zoom</button>
    </div>

    <div class="map-container">
        <div id="tooltip"></div>
        <!-- SVG will be appended here -->
    </div>

    <script type="text/javascript">
        // Dimensions
        var w = 960;
        var h = 600;

        // Define projection
        var projection = d3.geoAlbersUsa()
            .translate([w / 2, h / 2])
            .scale(1200);

        // Define path generator
        var path = d3.geoPath()
            .projection(projection);

        // Modern color scale (ColorBrewer Greens)
        var color = d3.scaleQuantize()
            .range(["#edf8e9", "#bae4b3", "#74c476", "#31a354", "#006d2c"]);

        // Formatter
        var formatDecimals = d3.format(".2f");

        // Create SVG
        var svg = d3.select(".map-container")
            .append("svg")
            .attr("viewBox", "0 0 " + w + " " + h)
            .attr("preserveAspectRatio", "xMidYMid meet");

        // Tooltip selection
        var tooltip = d3.select("#tooltip");

        // Zoom behavior
        var zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", function() {
                g.attr("transform", d3.event.transform);
            });

        // Main group for map features
        var g = svg.append("g");

        svg.call(zoom);

        // Load data
        d3.csv("inner/us-ag-productivity.csv", function(data) {
            
            // Set input domain
            color.domain([
                d3.min(data, function(d) { return +d.value; }),
                d3.max(data, function(d) { return +d.value; })
            ]);

            // Load GeoJSON
            d3.json("inner/us-states.json", function(json) {

                // Merge data
                for (var i = 0; i < data.length; i++) {
                    var dataState = data[i].state;
                    var dataValue = parseFloat(data[i].value);

                    for (var j = 0; j < json.features.length; j++) {
                        var jsonState = json.features[j].properties.name;
                        if (dataState == jsonState) {
                            json.features[j].properties.value = dataValue;
                            break;
                        }
                    }
                }

                // Draw map
                g.selectAll("path")
                    .data(json.features)
                    .enter()
                    .append("path")
                    .attr("d", path)
                    .attr("class", "state")
                    .style("fill", function(d) {
                        var value = d.properties.value;
                        return value ? color(value) : "#ccc";
                    })
                    .on("mouseover", function(d) {
                        tooltip.transition()
                            .duration(200)
                            .style("opacity", 1);
                        
                        var val = d.properties.value ? formatDecimals(d.properties.value) : "N/A";
                        tooltip.html("<strong>" + d.properties.name + "</strong><br/>Value: " + val)
                            .style("left", (d3.event.pageX - 450) + "px") // Relative adjustment for centered container
                            .style("top", (d3.event.pageY - 120) + "px");
                    })
                    .on("mousemove", function(d) {
                        // Position based on container position
                        var container = document.querySelector('.map-container').getBoundingClientRect();
                        tooltip.style("left", (d3.event.clientX - container.left + 15) + "px")
                               .style("top", (d3.event.clientY - container.top - 40) + "px");
                    })
                    .on("mouseout", function(d) {
                        tooltip.transition()
                            .duration(500)
                            .style("opacity", 0);
                    });

                // Add Legend
                var legendWidth = 200;
                var legendHeight = 10;
                var legend = svg.append("g")
                    .attr("class", "legend")
                    .attr("transform", "translate(" + (w - legendWidth - 40) + "," + (h - 60) + ")");

                legend.append("text")
                    .attr("class", "legend-title")
                    .attr("y", -10)
                    .text("Productivity Value");

                var legendScale = d3.scaleLinear()
                    .domain(color.domain())
                    .range([0, legendWidth]);

                var legendAxis = d3.axisBottom(legendScale)
                    .ticks(5)
                    .tickFormat(d3.format(".1f"));

                var legendData = color.range().map(function(d) {
                    var extent = color.invertExtent(d);
                    if (extent[0] == null) extent[0] = legendScale.domain()[0];
                    if (extent[1] == null) extent[1] = legendScale.domain()[1];
                    return extent;
                });

                legend.selectAll("rect")
                    .data(legendData)
                    .enter()
                    .append("rect")
                    .attr("height", legendHeight)
                    .attr("x", function(d) { return legendScale(d[0]); })
                    .attr("width", function(d) { return legendScale(d[1]) - legendScale(d[0]); })
                    .style("fill", function(d) { return color(d[0]); });

                legend.append("g")
                    .attr("transform", "translate(0," + legendHeight + ")")
                    .call(legendAxis);
            });
        });

        // Button behaviors
        d3.select("#pnw").on("click", function() {
            svg.transition()
                .duration(1500)
                .call(zoom.transform, d3.zoomIdentity
                    .translate(w / 2, h / 2)
                    .scale(2.5)
                    .translate(-150, 100)); // Focus on PNW area
        });

        d3.select("#reset").on("click", function() {
            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity);
        });

    </script>
</body>
</html>
